  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tus ---- */\n  --success-700:#1F5A3C;\n  --success-500:#2F8A57;\n  --success-100:#DCEEE4;\n  --danger-700: #8C2B22;\n  --danger-500: #BC3B2C;\n  --danger-100: #F4DFDB;\n  --warning-700:#8A5A12;\n  --warning-500:#C2871C;\n  --warning-100:#F6E9CE;\n  --info-700:   #1F4E70;\n  --info-500:   #2E76A6;\n  --info-100:   #DBE9F3;\n\n  /* ---- Forensic trace palette (blockchain flow graph) ---- */\n  --trace-tainted: #BC3B2C;  /* origin of theft / tainted funds */\n  --trace-hop:     #8A7B66;  /* intermediary / pass-through wallet */\n  --trace-exchange:#2E76A6;  /* VASP / exchange off-ramp */\n  --trace-mixer:   #6B4E8C;  /* mixer / obfuscation service */\n  --trace-frozen:  #2F8A57;  /* frozen / recovered */\n\n  /* ============================================================\n     Semantic aliases — reference these in components\n     ============================================================ */\n  --bg-page:        var(--cream);\n  --bg-page-alt:    var(--cream-dim);\n  --bg-ink:         var(--navy-900);\n  --bg-ink-deep:    var(--navy-950);\n  --surface-card:   var(--white);\n  --surface-sunken: var(--ink-50);\n  --surface-raised: var(--white);\n  --surface-inverse:var(--navy-800);\n\n  --text-strong:    var(--ink-900);\n  --text-body:      var(--ink-700);\n  --text-muted:     var(--ink-500);\n  --text-subtle:    var(--ink-400);\n  --text-inverse:   var(--cream);\n  --text-inverse-muted: var(--navy-200);\n  --text-link:      var(--navy-700);\n  --text-on-accent: var(--cream);\n\n  --accent:         var(--stone-500);\n  --accent-strong:  var(--stone-600);\n  --accent-deep:    var(--stone-700);\n  --accent-soft:    var(--stone-100);\n  --primary:        var(--ink-900);\n  --primary-hover:  var(--ink-800);\n  --primary-active: var(--ink-950);\n\n  --border-subtle:  var(--ink-100);\n  --border-default: var(--ink-200);\n  --border-strong:  var(--ink-300);\n  --border-ink:     var(--ink-900);\n  --border-accent:  var(--stone-500);\n  --ring-focus:     color-mix(in oklch, var(--navy-700) 45%, transparent);\n\n  --text-success:   var(--success-700);\n  --text-danger:    var(--danger-700);\n  --text-warning:   var(--warning-700);\n  --text-info:      var(--info-700);\n}\n\n/* ============================================================\n   BERG PC — Typography tokens\n   Playfair Display (high-contrast Didone) matches the wordmark —\n   reserved for display & editorial moments.\n   Libre Franklin: clean, authoritative American grotesque for body & UI.\n   IBM Plex Mono: forensic data — wallet addresses, txids, hashes.\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-serif: \"Playfair Display\", Georgia, \"Times New Roman\", serif;\n  --font-sans:  \"Libre Franklin\", -apple-system, \"Segoe UI\", Helvetica, Arial, sans-serif;\n  --font-mono:  \"IBM Plex Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* Semantic family aliases */\n  --font-display: var(--font-serif);\n  --font-heading: var(--font-serif);\n  --font-body:    var(--font-sans);\n  --font-ui:      var(--font-sans);\n  --font-data:    var(--font-mono);\n\n  /* ---- Type scale (1.250 major-third on a 16px base) ---- */\n  --text-2xs: 0.6875rem;  /* 11px — legal fine print, table micro-labels */\n  --text-xs:  0.75rem;    /* 12px — captions, eyebrows */\n  --text-sm:  0.875rem;   /* 14px — secondary UI, dense tables */\n  --text-base:1rem;       /* 16px — body */\n  --text-md:  1.125rem;   /* 18px — lead body */\n  --text-lg:  1.375rem;   /* 22px — card titles */\n  --text-xl:  1.75rem;    /* 28px — section headings */\n  --text-2xl: 2.25rem;    /* 36px — page titles */\n  --text-3xl: 2.875rem;   /* 46px — hero sub */\n  --text-4xl: 3.75rem;    /* 60px — hero */\n  --text-5xl: 4.75rem;    /* 76px — display */\n\n  /* ---- Weights ---- */\n  --weight-regular: 400;\n  --weight-medium:  500;\n  --weight-semibold:600;\n  --weight-bold:    700;\n\n  /* ---- Line heights ---- */\n  --leading-tight:  1.1;\n  --leading-snug:   1.25;\n  --leading-normal: 1.5;\n  --leading-relaxed:1.65;\n\n  /* ---- Letter spacing ---- */\n  --tracking-tight:  -0.02em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-eyebrow:0.16em;  /* uppercase eyebrows / kickers */\n}\n\n/* ============================================================\n   BERG — Spacing & layout tokens\n   4px base grid. Generous, editorial whitespace.\n   ============================================================ */\n\n:root {\n  --space-0:  0;\n  --space-1:  0.25rem;   /* 4 */\n  --space-2:  0.5rem;    /* 8 */\n  --space-3:  0.75rem;   /* 12 */\n  --space-4:  1rem;      /* 16 */\n  --space-5:  1.5rem;    /* 24 */\n  --space-6:  2rem;      /* 32 */\n  --space-7:  2.5rem;    /* 40 */\n  --space-8:  3rem;      /* 48 */\n  --space-9:  4rem;      /* 64 */\n  --space-10: 5rem;      /* 80 */\n  --space-11: 6rem;      /* 96 */\n  --space-12: 8rem;      /* 128 */\n\n  /* ---- Layout ---- */\n  --container-max: 1200px;\n  --container-wide:1320px;\n  --container-prose: 680px;\n  --gutter: var(--space-5);\n  --section-y: var(--space-11);\n\n  /* ---- Radii (restrained; legal = squared, not playful) ---- */\n  --radius-xs: 2px;\n  --radius-sm: 4px;\n  --radius-md: 6px;\n  --radius-lg: 10px;\n  --radius-xl: 16px;\n  --radius-pill: 999px;\n}\n\n/* ============================================================\n   BERG — Elevation, borders & motion\n   Shadows are cool-navy tinted, low and precise — not soft puffy.\n   ============================================================ */\n\n:root {\n  /* ---- Shadows (navy-tinted, restrained) ---- */\n  --shadow-xs: 0 1px 2px rgba(8, 20, 40, 0.06);\n  --shadow-sm: 0 1px 3px rgba(8, 20, 40, 0.08), 0 1px 2px rgba(8, 20, 40, 0.04);\n  --shadow-md: 0 4px 12px rgba(8, 20, 40, 0.08), 0 2px 4px rgba(8, 20, 40, 0.04);\n  --shadow-lg: 0 12px 28px rgba(8, 20, 40, 0.12), 0 4px 8px rgba(8, 20, 40, 0.05);\n  --shadow-xl: 0 24px 50px rgba(8, 20, 40, 0.18), 0 8px 16px rgba(8, 20, 40, 0.06);\n  --shadow-inset: inset 0 1px 2px rgba(8, 20, 40, 0.06);\n  /* Gold focus glow for accent actions */\n  --shadow-gold: 0 4px 16px rgba(184, 146, 58, 0.28);\n\n  /* ---- Border widths ---- */\n  --border-hair: 1px;\n  --border-thick: 2px;\n  --border-rule: 3px;   /* gold rule under headings */\n\n  /* ---- Focus ring ---- */\n  --focus-ring: 0 0 0 3px var(--ring-focus);\n\n  /* ---- Motion ---- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);   /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);       /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);   /* @kind other */\n  --duration-fast: 120ms;   /* @kind other */\n  --duration-base: 200ms;   /* @kind other */\n  --duration-slow: 360ms;   /* @kind other */\n}\n\n/* ============================================================\n   BERG — Base element styles & a few brand utilities\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: var(--leading-relaxed);\n  color: var(--text-body);\n  background: var(--bg-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-heading);\n  color: var(--text-strong);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  margin: 0 0 0.5em;\n  text-wrap: balance;\n}\nh1 { font-size: var(--text-2xl); }\nh2 { font-size: var(--text-xl); }\nh3 { font-size: var(--text-lg); }\n\np { margin: 0 0 1em; text-wrap: pretty; }\n\na { color: var(--text-link); text-decoration: none; }\na:hover { text-decoration: underline; text-underline-offset: 2px; }\n\ncode, kbd, samp { font-family: var(--font-data); font-size: 0.9em; }\n\n::selection { background: var(--stone-200); color: var(--ink-900); }\n\n/* ---- Brand utilities ---- */\n.berg-eyebrow {\n  font-family: var(--font-ui);\n  font-size: var(--text-xs);\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--accent-strong);\n}\n\n/* Gold rule — the recurring brand divider under headings */\n.berg-rule {\n  width: 56px;\n  height: var(--border-rule);\n  background: var(--accent);\n  border: 0;\n  margin: var(--space-4) 0;\n}\n\n.berg-container {\n  width: 100%;\n  max-width: var(--container-max);\n  margin-inline: auto;\n  padding-inline: var(--gutter);\n}\n\n/* Mono data string — wallet addresses, hashes, txids */\n.berg-mono {\n  font-family: var(--font-data);\n  font-variant-ligatures: none;\n  letter-spacing: 0.01em;\n}\n\n<\u002Fstyle>\n<style>/* Berg PC — shared marketing page styles (link after styles.css) */\n*{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;}\nbody{margin:0;background:var(--cream);color:var(--ink-800);font-family:var(--font-sans);overflow-x:hidden;}\n::selection{background:var(--stone-300);color:var(--navy-950);}\na{color:inherit;text-decoration:none;}\n.container{max-width:1120px;margin:0 auto;padding:0 40px;}\n\nnav.top{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;\n  padding:16px 40px;transition:background .4s,padding .4s,border-color .4s;border-bottom:1px solid transparent;}\nnav.top.scrolled{background:rgba(14,22,34,.85);backdrop-filter:blur(14px);padding:11px 40px;border-bottom:1px solid rgba(138,123,102,.18);}\nnav.top img{height:38px;}\nnav .links{display:flex;gap:28px;font-size:14px;color:var(--navy-100);}\nnav .links a:hover{color:var(--cream);}\nnav .cta{font-family:var(--font-ui);font-weight:600;font-size:13.5px;background:var(--stone-500);color:var(--navy-950);padding:9px 16px;border-radius:var(--radius-sm);transition:background .2s,transform .2s;}\nnav .cta:hover{background:var(--stone-400);transform:translateY(-1px);}\n@media(max-width:760px){nav .links{disp t-family:var(--font-serif);font-weight:500;font-size:clamp(40px,5vw,62px);line-height:1;letter-spacing:-.02em;color:var(--cream);}\n  .stat .cap{font-size:15px;color:var(--navy-100);margin-top:14px;line-height:1.5;max-width:30ch;}\n  .stat .yr{font-family:var(--font-mono);font-size:12px;color:var(--stone-300);margin-top:9px;display:block;}\n  .stat{border-top:2px solid var(--stone-500);padding-top:20px;}\n  .case h3{font-family:var(--font-serif);font-size:22px;color:var(--ink-900);margin:0 0 6px;font-weight:600;}\n  .case .tag{display:inline-block;font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--stone-700);background:var(--stone-100);border-radius:var(--radius-pill);padding:3px 11px;margin-bottom:14px;}\n  .case p{font-size:14.5px;line-height:1.6;color:var(--ink-600);margin:0 0 14px;}\n  .case .out{font-family:var(--font-ui);font-size:14px;font-weight:600;color:var(--success-700);display:flex;align-items:center;gap:7px;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<nav class=\"top\" id=\"nav\">\n  <a href=\"Berg PC Home (Animated).html\"><img src=\"eedf35ed-4510-48f0-9bba-b48171e75ea6\" alt=\"Berg PC\"><\u002Fa>\n  <div class=\"links\">\n    <a href=\"Berg PC Home (Animated).html#practice\">Practice<\u002Fa>\n    <a href=\"Berg PC Results (Animated).html\">Results<\u002Fa>\n    <a href=\"Berg PC Team (Animated).html\">Team<\u002Fa>\n    <a href=\"Berg PC Home (Animated).html#contact\">Contact<\u002Fa>\n  <\u002Fdiv>\n  <a class=\"cta\" href=\"app/index.html\">Tell us about your case<\u002Fa>\n<\u002Fnav>\n\n<header class=\"hero\">\n  <canvas id=\"net\"><\u002Fcanvas>\n  <div class=\"container\">\n    <a class=\"crumb\" href=\"Berg PC Home (Animated).html\">← Home<\u002Fa>\n    <div class=\"eyebrow\">Recent Results<\u002Fdiv>\n    <h1>Outcomes that hold up in court.<\u002Fh1>\n    <p class=\"lead\">We pair senior trial attorneys with digital forensics experts — and the results show it. A selection of recent l',chk,{passive:true});chk();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
