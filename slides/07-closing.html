<!-- @dsCard group="Slides" viewport="1280x720" name="Closing / contact" subtitle="Navy closing with CTA and contact" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<style>html,body{margin:0;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="parts.jsx"></script>
<script type="text/babel">
const { Slide, Eyebrow, Rule, SIco, LOGO_REV } = window.BergSlides;
function S(){
  return (
    <Slide bg="var(--navy-900)">
      <div style={{ position: "absolute", left: 64, top: "50%", transform: "translateY(-50%)" }}>
        <Eyebrow light>Tell us about your case</Eyebrow>
        <Rule light/>
        <h1 style={{ fontFamily: "var(--font-serif)", fontWeight: 600, fontSize: 60, letterSpacing: "-0.02em", color: "var(--cream)", margin: 0, maxWidth: 820, lineHeight: 1.06 }}>
          Let's recover what was taken.
        </h1>
        <div style={{ display: "flex", gap: 40, marginTop: 44 }}>
          {[["phone","281 857-6666"],["mail","info@bergpclawfirms.com"],["map-pin","24 Greenway Plaza, Houston"]].map(([ic,t])=>(
            <div key={t} style={{ display: "flex", alignItems: "center", gap: 11 }}>
              <SIco n={ic} s={20} c="var(--stone-300)"/>
              <span style={{ fontFamily: "var(--font-ui)", fontSize: 19, color: "var(--navy-100)" }}>{t}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{ position: "absolute", right: 64, bottom: 48 }}><img src={LOGO_REV} style={{ height: 46 }} alt="Berg PC"/></div>
    </Slide>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<S/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(),40);
</script>
</body>
</html>
