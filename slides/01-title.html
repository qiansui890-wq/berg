<!-- @dsCard group="Slides" viewport="1280x720" name="Title slide" subtitle="Navy cover with mark and tagline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<style>html,body{margin:0;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="parts.jsx"></script>
<script type="text/babel">
const { Slide, Eyebrow, Rule, LOGO_REV } = window.BergSlides;
function S(){
  return (
    <Slide bg="var(--navy-900)">
      <div style={{ position: "absolute", top: 64, left: 64 }}><img src={LOGO_REV} style={{ height: 52 }} alt="Berg PC"/></div>
      <div style={{ position: "absolute", left: 64, right: 64, top: "50%", transform: "translateY(-50%)" }}>
        <Eyebrow light>Crypto Fraud &amp; Recovery</Eyebrow>
        <Rule light/>
        <h1 style={{ fontFamily: "var(--font-serif)", fontWeight: 600, fontSize: 72, lineHeight: 1.04, letterSpacing: "-0.02em", color: "var(--cream)", margin: 0, maxWidth: 980 }}>
          Recover what was taken.
        </h1>
        <p style={{ fontSize: 24, color: "var(--navy-100)", margin: "28px 0 0", maxWidth: 760, lineHeight: 1.5 }}>
          Senior attorneys and digital forensics experts, working together to trace and recover stolen digital assets.
        </p>
      </div>
      <div style={{ position: "absolute", left: 64, bottom: 48, fontFamily: "var(--font-mono)", fontSize: 14, color: "var(--navy-200)" }}>Houston, Texas · 281 857-6666</div>
    </Slide>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<S/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(),40);
</script>
</body>
</html>
