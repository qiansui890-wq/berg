<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<style>html,body{margin:0;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="parts.jsx"></script>
<script type="text/babel">
const { Slide, Eyebrow, Chrome } = window.BergSlides;
function S(){
  return (
    <Slide bg="var(--stone-100)">
      <div style={{ position: "absolute", right: -40, top: -60, fontFamily: "var(--font-serif)", fontWeight: 700, fontSize: 460, color: "var(--stone-200)", lineHeight: 1, userSelect: "none" }}>01</div>
      <div style={{ position: "absolute", left: 64, top: "50%", transform: "translateY(-50%)" }}>
        <Eyebrow>Section One</Eyebrow>
        <h1 style={{ fontFamily: "var(--font-serif)", fontWeight: 600, fontSize: 64, letterSpacing: "-0.02em", color: "var(--ink-900)", margin: "24px 0 0", maxWidth: 760, lineHeight: 1.05 }}>
          How asset recovery works
        </h1>
        <p style={{ fontSize: 22, color: "var(--ink-600)", margin: "22px 0 0", maxWidth: 620, lineHeight: 1.5 }}>
          Trace, identify, freeze, recover — a rigorous, evidence-led process.
        </p>
      </div>
      <Chrome n="Section 1"/>
    </Slide>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<S/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(),40);
</script>
</body>
</html>
