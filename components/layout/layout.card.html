<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;background:var(--cream);font-family:var(--font-sans);padding:24px 28px;color:var(--ink-700);}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--stone-600);margin:0 0 11px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Card, CardHeader, Stat, Tabs, Badge, Button } = window.BergPCDesignSystem_eb13e3;
function Demo(){
  const [tab,setTab] = React.useState("trace");
  return (
    <div>
      <div className="grid">
        <Card padding="lg" interactive>
          <CardHeader eyebrow="Crypto Litigation" title="Crypto Fraud & Recovery"
            trailing={<Badge tone="success">No win, no fee</Badge>} />
          <p style={{margin:0,fontSize:14,lineHeight:1.55,color:'var(--ink-600)'}}>
            We trace stolen digital assets across the blockchain, identify the wallets and platforms involved, and pursue recovery through the courts.
          </p>
        </Card>
        <Card padding="lg" style={{background:'var(--stone-100)',border:'none',display:'flex',gap:28,alignItems:'center'}}>
          <Stat label="Returned to client" value="$500K" caption="2025" />
          <div style={{width:1,alignSelf:'stretch',background:'var(--stone-300)'}}></div>
          <Stat label="Wallets frozen" value="30" caption="First in TX" />
        </Card>
      </div>

      <div className="lbl">Tabs</div>
      <Tabs value={tab} onChange={setTab} items={[
        {id:"overview",label:"Overview"},
        {id:"trace",label:"Asset trace"},
        {id:"docs",label:"Documents"},
        {id:"timeline",label:"Timeline"},
      ]}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
