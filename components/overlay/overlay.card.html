<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  html,body{margin:0;height:100%;}
  body{background:var(--cream);font-family:var(--font-sans);position:relative;min-height:420px;}
  /* render the modal inline within the card frame */
  #root .scrim{position:absolute !important;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Dialog, Button } = window.BergPCDesignSystem_eb13e3;
function Demo(){
  return (
    <div style={{position:'relative',height:420}}>
      {/* Dialog rendered open; override fixed->absolute so it sits in the card */}
      <Dialog open={true} onClose={()=>{}}
        title="Confirm document submission"
        description="This file will be added to your case record and shared with your investigation team."
        width={440}
        footer={<><Button variant="ghost">Cancel</Button><Button variant="primary">Submit document</Button></>}>
        Bank statement — <b>Feb-2025-wire.pdf</b> (240 KB). Once submitted, it cannot be removed without contacting the firm.
      </Dialog>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
// pin the modal inside the card frame
setTimeout(()=>{const s=document.querySelector('[role=dialog]')?.parentElement; if(s) s.style.position='absolute';},40);
</script>
</body>
