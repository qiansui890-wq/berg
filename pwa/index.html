<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0E1622">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Berg PC">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Berg PC — Client</title>
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<script src="../app/logos.js"></script>
<script src="push.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:#0B1119;font-family:var(--font-sans);overscroll-behavior:none;}
  #app{max-width:460px;margin:0 auto;min-height:100vh;background:var(--cream);position:relative;display:flex;flex-direction:column;
    box-shadow:0 0 60px rgba(0,0,0,.4);}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:84px;}
  .safe-t{padding-top:env(safe-area-inset-top);}
  .fade{animation:fade .35s ease both;}@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  button{font-family:var(--font-ui);cursor:pointer;}
  [data-lucide]{width:20px;height:20px;}
  /* tab bar */
  .tabs{position:absolute;bottom:0;left:0;right:0;display:flex;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
    border-top:1px solid var(--ink-100);padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:20;}
  .tab{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--ink-400);font-size:10.5px;font-weight:600;letter-spacing:.02em;transition:color .15s;position:relative;}
  .tab.on{color:var(--ink-900);}
  .tab.on .badge{position:absolute;top:2px;right:50%;margin-right:-18px;}
  .badge{background:var(--danger-500);color:#fff;font-family:var(--font-mono);font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="../app/db.js" data-presets="env,react"></script>
<script type="text/babel">
const LOGO = (window.BERG_LOGOS && window.BERG_LOGOS.logoRev) || "../assets/berg-pc-logo-reverse.png";
const Ico = ({n,s=20,c}) => <i data-lucide={n} style={{width:s,height:s,color:c}}></i>;
const useIcons = () => React.useEffect(()=>{ const t=setTimeout(()=>window.lucide&&window.lucide.createIcons(),20); return ()=>clearTimeout(t); });
const money = (n)=>window.DB.fmtMoney(n);

/* ---------------- Login ---------------- */
function Login({onIn}){
  const [email,setEmail]=React.useState(""); const [pw,setPw]=React.useState(""); const [err,setErr]=React.useState("");
  useIcons();
  function go(em,p){ const r=window.DB.login(em||email,p||pw); if(r.error){setErr(r.error);return;} onIn(r.user); }
  const fld={width:"100%",border:"1px solid var(--border-default)",borderRadius:"var(--radius-sm)",padding:"14px 14px",fontFamily:"var(--font-ui)",fontSize:16,color:"var(--ink-900)",outline:"none",background:"#fff"};
  return (
    <div className="safe-t" style={{flex:1,display:"flex",flexDirection:"column",color:"var(--cream)",
      background:"radial-gradient(120% 80% at 20% 0%,#1E2C3E,#0E1622)",padding:"56px 26px 30px"}}>
      <img src={LOGO} alt="Berg PC" style={{height:46,alignSelf:"flex-start"}}/>
      <div style={{marginTop:"auto"}}>
        <div style={{fontSize:11.5,fontWeight:600,letterSpacing:".2em",textTransform:"uppercase",color:"var(--stone-300)"}}>Client Portal</div>
        <h1 style={{fontFamily:"var(--font-serif)",fontWeight:500,fontSize:38,lineHeight:1.08,letterSpacing:"-.02em",margin:"14px 0 0",color:"var(--cream)"}}>Recover what was <span style={{fontStyle:"italic",color:"var(--stone-300)"}}>taken.</span></h1>
        <p style={{color:"var(--navy-100)",fontSize:15,lineHeight:1.55,marginTop:14}}>Sign in to track your case, upload evidence, and message your attorney.</p>
      </div>
      <div style={{background:"var(--cream)",margin:"28px -26px -30px",padding:"26px 26px calc(30px + env(safe-area-inset-bottom))",borderTopLeftRadius:22,borderTopRightRadius:22}}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <input style={fld} type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)}/>
          <input style={fld} type="password" placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)}/>
          {err && <div style={{color:"var(--danger-700)",fontSize:13,fontFamily:"var(--font-ui)"}}>{err}</div>}
          <button onClick={()=>go()} style={{border:"none",background:"var(--ink-900)",color:"var(--cream)",borderRadius:"var(--radius-sm)",padding:"15px",fontSize:16,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Sign in <Ico n="arrow-right" s={18} c="var(--cream)"/></button>
          <button onClick={()=>go("jane@email.com","client")} style={{border:"1px solid var(--border-default)",background:"#fff",color:"var(--ink-700)",borderRadius:"var(--radius-sm)",padding:"13px",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:9}}><Ico n="user-round" s={16} c="var(--stone-600)"/> Use demo client account</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Progress ---------------- */
function Progress({client}){
  useIcons();
  const STEPS=window.DB.STAGES, idx=STEPS.indexOf(client.status);
  const traced=client.wallets.length?Math.min(99,40+client.wallets.length*12):0;
  const lawyer=window.DB.users().find(u=>u.id===client.lawyerId);
  const [grown,setGrown]=React.useState(false);
  React.useEffect(()=>{const t=setTimeout(()=>setGrown(true),80);return()=>clearTimeout(t);},[]);
  return (
    <div className="fade" style={{padding:"20px 18px"}}>
      <div style={{fontSize:11.5,fontWeight:600,letterSpacing:".16em",textTransform:"uppercase",color:"var(--stone-600)"}}>{client.matterType}</div>
      <h1 style={{fontFamily:"var(--font-serif)",fontSize:25,margin:"7px 0 2px",color:"var(--ink-900)"}}>Hi, {client.name.split(" ")[0]}</h1>
      <div style={{fontFamily:"var(--font-mono)",fontSize:12,color:"var(--ink-400)"}}>Case {client.id.toUpperCase()}</div>

      <div style={{display:"flex",gap:12,margin:"18px 0"}}>
        <div style={{flex:1,background:"var(--navy-900)",color:"var(--cream)",borderRadius:"var(--radius-lg)",padding:"16px 16px"}}>
          <div style={{fontSize:11,letterSpacing:".1em",textTransform:"uppercase",color:"var(--navy-200)"}}>At issue</div>
          <div style={{fontFamily:"var(--font-serif)",fontSize:26,marginTop:5}}>{money(client.amountLost)}</div>
        </div>
        <div style={{flex:1,background:"var(--stone-100)",borderRadius:"var(--radius-lg)",padding:"16px 16px"}}>
          <div style={{fontSize:11,letterSpacing:".1em",textTransform:"uppercase",color:"var(--stone-700)"}}>Traced</div>
          <div style={{fontFamily:"var(--font-serif)",fontSize:26,marginTop:5,color:"var(--ink-900)"}}>{traced}%</div>
        </div>
      </div>

      <div style={{background:"#fff",border:"1px solid var(--ink-100)",borderRadius:"var(--radius-lg)",padding:"18px 18px"}}>
        <div style={{fontFamily:"var(--font-serif)",fontSize:17,color:"var(--ink-900)",marginBottom:14}}>Case progress</div>
        {STEPS.map((t,i)=>{const st=i<idx?"done":i===idx?"active":"todo";return (
          <div key={t} style={{display:"flex",gap:13}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
              <span style={{width:28,height:28,borderRadius:"50%",flex:"none",display:"flex",alignItems:"center",justifyContent:"center",
                background:st==="done"?"var(--success-500)":st==="active"?"var(--navy-800)":"var(--ink-100)",
                color:st==="todo"?"var(--ink-400)":"var(--cream)",border:st==="active"?"3px solid var(--stone-300)":"none"}}>
                {st==="done"?<Ico n="check" s={14} c="var(--cream)"/>:st==="active"?<Ico n="loader" s={14} c="var(--cream)"/>:<span style={{fontSize:11,fontWeight:700}}>{i+1}</span>}
              </span>
              {i<STEPS.length-1 && <span style={{width:2,flex:1,minHeight:20,background:i<idx?"var(--success-500)":"var(--border-default)",transform:grown?"scaleY(1)":"scaleY(0)",transformOrigin:"top",transition:"transform .5s ease "+(i*0.1)+"s"}}/>}
            </div>
            <div style={{paddingBottom:14,fontFamily:"var(--font-ui)",fontSize:14.5,fontWeight:st==="todo"?500:600,color:st==="todo"?"var(--ink-400)":"var(--ink-900)"}}>{t}</div>
          </div>
        );})}
      </div>

      <div style={{background:"#fff",border:"1px solid var(--ink-100)",borderRadius:"var(--radius-lg)",padding:"16px 18px",marginTop:14,display:"flex",alignItems:"center",gap:12}}>
        <span style={{width:42,height:42,borderRadius:"50%",background:"var(--navy-800)",color:"var(--cream)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-ui)",fontWeight:600}}>{(lawyer?lawyer.name:"BP").split(" ").map(w=>w[0]).slice(0,2).join("")}</span>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"var(--ink-900)"}}>{lawyer?lawyer.name:"Berg PC"}</div><div style={{fontSize:12.5,color:"var(--ink-500)"}}>{lawyer?(lawyer.title||"Handling attorney"):"Your attorney"}</div></div>
      </div>
    </div>
  );
}

/* ---------------- Documents ---------------- */
function Docs({client,bump}){
  useIcons();
  const ref=React.useRef(null);
  const icon=(t)=>({pdf:"file-text",zip:"file-archive",csv:"file-spreadsheet",img:"file-image"})[t]||"file";
  function pick(e){const f=e.target.files&&e.target.files[0];e.target.value="";if(!f)return;
    const ext=(f.name.split(".").pop()||"").toLowerCase();
    const type=["png","jpg","jpeg","gif","webp"].includes(ext)?"img":["csv","xls","xlsx"].includes(ext)?"csv":["zip","rar"].includes(ext)?"zip":"pdf";
    const size=f.size<1048576?Math.round(f.size/1024)+" KB":(f.size/1048576).toFixed(1)+" MB";
    const done=(dataUrl)=>{window.DB.addDoc(client.id,{name:f.name,type,size,dataUrl},client.name);bump();};
    if(f.size<=4194304){const r=new FileReader();r.onload=()=>done(r.result);r.readAsDataURL(f);}else done(null);
  }
  return (
    <div className="fade" style={{padding:"20px 18px"}}>
      <h1 style={{fontFamily:"var(--font-serif)",fontSize:23,margin:"0 0 4px",color:"var(--ink-900)"}}>My documents</h1>
      <p style={{fontSize:13,color:"var(--ink-500)",margin:"0 0 16px"}}>Files go to your case evidence vault.</p>
      <input ref={ref} type="file" onChange={pick} style={{display:"none"}}/>
      <button onClick={()=>ref.current.click()} style={{width:"100%",border:"none",background:"var(--ink-900)",color:"var(--cream)",borderRadius:"var(--radius-sm)",padding:"15px",fontSize:15,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:9,marginBottom:16}}><Ico n="upload" s={18} c="var(--cream)"/> Upload a file</button>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {client.documents.map(d=>(
          <div key={d.id} style={{display:"flex",alignItems:"center",gap:12,background:"#fff",border:"1px solid var(--ink-100)",borderRadius:"var(--radius-md)",padding:"12px 13px"}}>
            <Ico n={icon(d.type)} s={19} c="var(--stone-600)"/>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:500,color:"var(--ink-800)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.name}</div><div style={{fontFamily:"var(--font-mono)",fontSize:11,color:"var(--ink-400)"}}>{d.size} · {d.uploadedBy}</div></div>
            {d.dataUrl && <a href={d.dataUrl} download={d.name} style={{color:"var(--ink-500)",display:"flex"}}><Ico n="download" s={17} c="var(--ink-500)"/></a>}
            <span style={{fontFamily:"var(--font-ui)",fontSize:10.5,fontWeight:600,padding:"3px 8px",borderRadius:999,background:d.status==="verified"?"var(--success-100)":"var(--warning-100)",color:d.status==="verified"?"var(--success-700)":"var(--warning-700)"}}>{d.status==="verified"?"Verified":"Review"}</span>
          </div>
        ))}
        {!client.documents.length && <div style={{textAlign:"center",color:"var(--ink-400)",fontSize:13.5,padding:"40px 0"}}>No files yet.</div>}
      </div>
    </div>
  );
}

/* ---------------- Messages ---------------- */
function Messages({client,user,bump}){
  useIcons();
  const [text,setText]=React.useState("");
  const endRef=React.useRef(null);
  const msgs=client.messages||[];
  React.useEffect(()=>{window.DB.markMessagesRead(client.id,user.id);},[]);
  React.useEffect(()=>{if(endRef.current)endRef.current.scrollTop=endRef.current.scrollHeight;});
  function send(){if(!text.trim())return;window.DB.sendMessage(client.id,user,text);setText("");bump();}
  return (
    <div className="fade" style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"18px 18px 10px"}}><h1 style={{fontFamily:"var(--font-serif)",fontSize:23,margin:0,color:"var(--ink-900)"}}>Secure messages</h1></div>
      <div ref={endRef} style={{flex:1,overflowY:"auto",padding:"10px 16px",display:"flex",flexDirection:"column",gap:10,background:"var(--bg-page-alt)"}}>
        {msgs.length?msgs.map(m=>{const mine=m.fromId===user.id;return (
          <div key={m.id} style={{alignSelf:mine?"flex-end":"flex-start",maxWidth:"80%"}}>
            <div style={{background:mine?"var(--navy-800)":"#fff",color:mine?"var(--cream)":"var(--ink-800)",border:mine?"none":"1px solid var(--ink-100)",borderRadius:14,padding:"10px 13px",fontSize:14.5,lineHeight:1.45}}>{m.text}</div>
            <div style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--ink-400)",marginTop:3,textAlign:mine?"right":"left"}}>{mine?"You":m.fromName}</div>
          </div>
        );}):<div style={{margin:"auto",textAlign:"center",color:"var(--ink-400)",fontSize:13.5}}>No messages yet.</div>}
      </div>
      <div style={{display:"flex",gap:8,padding:"10px 12px",borderTop:"1px solid var(--ink-100)",background:"#fff"}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send();}} placeholder="Message…" style={{flex:1,border:"1px solid var(--border-default)",borderRadius:999,padding:"11px 15px",fontSize:15,outline:"none"}}/>
        <button onClick={send} style={{border:"none",background:"var(--navy-800)",color:"#fff",borderRadius:"50%",width:44,height:44,flex:"none",display:"flex",alignItems:"center",justifyContent:"center"}}><Ico n="send" s={18} c="#fff"/></button>
      </div>
    </div>
  );
}

/* ---------------- Profile ---------------- */
function Profile({client,onOut}){
  useIcons();
  const row=(k,v)=><div style={{display:"flex",justifyContent:"space-between",padding:"13px 0",borderBottom:"1px solid var(--ink-100)"}}><span style={{fontSize:13.5,color:"var(--ink-500)"}}>{k}</span><span style={{fontSize:13.5,color:"var(--ink-900)",fontWeight:500,textAlign:"right",maxWidth:"60%"}}>{v||"—"}</span></div>;
  return (
    <div className="fade" style={{padding:"20px 18px"}}>
      <h1 style={{fontFamily:"var(--font-serif)",fontSize:23,margin:"0 0 14px",color:"var(--ink-900)"}}>My profile</h1>
      <div style={{background:"#fff",border:"1px solid var(--ink-100)",borderRadius:"var(--radius-lg)",padding:"6px 16px 14px"}}>
        {row("Name",client.name)}{row("Email",client.email)}{row("Phone",client.phone)}{row("Matter",client.matterType)}{row("At issue",money(client.amountLost))}{row("Platform",client.platform)}
      </div>
      <button onClick={onOut} style={{width:"100%",marginTop:18,border:"1px solid var(--border-default)",background:"#fff",color:"var(--danger-700)",borderRadius:"var(--radius-sm)",padding:"14px",fontSize:15,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><Ico n="log-out" s={17} c="var(--danger-700)"/> Sign out</button>
      <div style={{textAlign:"center",fontSize:12,color:"var(--ink-400)",marginTop:18,lineHeight:1.6}}>Berg PC · Houston, Texas<br/>Protected by attorney–client privilege</div>
    </div>
  );
}

/* ---------------- App shell ---------------- */
function App(){
  const [user,setUser]=React.useState(()=>window.DB.currentUser());
  const [tab,setTab]=React.useState("home");
  const [,force]=React.useReducer(x=>x+1,0);
  useIcons();
  /* local notifications: ask once, notify when an attorney reply arrives while open */
  const prevUnread=React.useRef(0);
  React.useEffect(()=>{ if(user&&"Notification"in window&&Notification.permission==="default"){ try{Notification.requestPermission();}catch(e){} } },[user]);
  React.useEffect(()=>{
    if(!user)return; const c=window.DB.clientByUser(user.id); if(!c)return;
    const un=(c.messages||[]).filter(m=>m.fromId!==user.id&&!m.read).length;
    if(un>prevUnread.current&&"Notification"in window&&Notification.permission==="granted"){ try{new Notification("Berg PC — message from your attorney",{body:"You have "+un+" unread message(s).",icon:"icon-192.png"});}catch(e){} }
    prevUnread.current=un;
  });
  React.useEffect(()=>{ if(user&&user.role==="client"&&window.bergEnablePush) window.bergEnablePush(user); },[user]);
  if(!user || user.role!=="client"){
    return <Login onIn={(u)=>{ if(u.role!=="client"){ /* this app is client-only */ } setUser(u); }}/>;
  }
  const client=window.DB.clientByUser(user.id);
  if(!client) return <div style={{padding:40,fontFamily:"var(--font-ui)"}}>No case linked. Contact the firm.</div>;
  const unread=(client.messages||[]).filter(m=>m.fromId!==user.id&&!m.read).length;
  const tabs=[["home","Progress","gauge"],["docs","Documents","files"],["messages","Messages","message-circle"],["profile","Profile","user"]];
  return (
    <React.Fragment>
      <div className="scroll" key={tab}>
        {tab==="home" && <Progress client={client}/>}
        {tab==="docs" && <Docs client={client} bump={force}/>}
        {tab==="messages" && <Messages client={client} user={user} bump={force}/>}
        {tab==="profile" && <Profile client={client} onOut={()=>{window.DB.logout();setUser(null);setTab("home");}}/>}
      </div>
      <div className="tabs">
        {tabs.map(([id,label,ic])=>(
          <button key={id} className={"tab"+(tab===id?" on":"")} onClick={()=>setTab(id)}>
            {id==="messages" && unread>0 && <span className="badge">{unread}</span>}
            <Ico n={ic} s={21} c={tab===id?"var(--ink-900)":"var(--ink-400)"}/>{label}
          </button>
        ))}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);

/* register service worker for installability / offline */
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
</body>
</html>
