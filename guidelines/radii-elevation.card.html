<!-- @dsCard group="Spacing" viewport="700x160" name="Radii & elevation" subtitle="Restrained corners; cool navy-tinted shadows." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--cream);padding:24px 28px;font-family:var(--font-sans);display:flex;gap:34px;align-items:center;}
  .group{display:flex;gap:16px;align-items:flex-end;}
  .box{width:64px;height:64px;background:var(--white);border:1px solid var(--ink-200);display:flex;align-items:flex-end;justify-content:center;}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--ink-400);padding-bottom:5px;}
  .sh{width:74px;height:64px;background:var(--white);border-radius:var(--radius-md);}
  .divider{width:1px;align-self:stretch;background:var(--ink-100);}
  .hd{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--stone-600);writing-mode:vertical-rl;transform:rotate(180deg);}
</style></head><body>
  <span class="hd">Radii</span>
  <div class="group">
    <div class="box" style="border-radius:2px"><span class="cap">xs</span></div>
    <div class="box" style="border-radius:4px"><span class="cap">sm</span></div>
    <div class="box" style="border-radius:6px"><span class="cap">md</span></div>
    <div class="box" style="border-radius:10px"><span class="cap">lg</span></div>
    <div class="box" style="border-radius:16px"><span class="cap">xl</span></div>
  </div>
  <div class="divider"></div>
  <span class="hd">Shadow</span>
  <div class="group">
    <div class="sh" style="box-shadow:var(--shadow-sm)"></div>
    <div class="sh" style="box-shadow:var(--shadow-md)"></div>
    <div class="sh" style="box-shadow:var(--shadow-lg)"></div>
    <div class="sh" style="box-shadow:var(--shadow-xl)"></div>
  </div>
</body></html>
