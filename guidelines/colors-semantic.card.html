<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — status" subtitle="Success, danger, warning, info. Muted, never neon." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--cream);padding:18px 20px;font-family:var(--font-sans);display:flex;gap:14px;}
  .col{flex:1;}
  .pair{display:flex;border-radius:var(--radius-sm);overflow:hidden;height:54px;box-shadow:var(--shadow-xs);}
  .d{flex:2;}.l{flex:1;}
  .name{font-size:11px;font-weight:600;color:var(--ink-800);margin-top:7px;text-transform:capitalize;}
  .hex{font-size:10px;font-family:var(--font-mono);color:var(--ink-400);}
</style></head><body>
  <div class="col"><div class="pair"><div class="d" style="background:#2F8A57"></div><div class="l" style="background:#DCEEE4"></div></div><div class="name">Success</div><div class="hex">#2F8A57</div></div>
  <div class="col"><div class="pair"><div class="d" style="background:#BC3B2C"></div><div class="l" style="background:#F4DFDB"></div></div><div class="name">Danger</div><div class="hex">#BC3B2C</div></div>
  <div class="col"><div class="pair"><div class="d" style="background:#C2871C"></div><div class="l" style="background:#F6E9CE"></div></div><div class="name">Warning</div><div class="hex">#C2871C</div></div>
  <div class="col"><div class="pair"><div class="d" style="background:#2E76A6"></div><div class="l" style="background:#DBE9F3"></div></div><div class="name">Info</div><div class="hex">#2E76A6</div></div>
</body></html>
