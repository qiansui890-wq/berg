<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--cream);padding:18px 20px;font-family:var(--font-sans);}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:74px;display:flex;align-items:flex-end;padding:7px;}
  .meta{display:flex;justify-content:space-between;margin-top:8px;padding:0 2px;}
  .t{font-size:11px;color:var(--ink-500);font-family:var(--font-mono);}
  b{color:var(--ink-900);}
  .cap{font-size:11px;letter-spacing:.04em;}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#121010"></div>
    <div class="sw" style="background:#1A1714"></div>
    <div class="sw" style="background:#262320"></div>
    <div class="sw" style="background:#3A3631"></div>
    <div class="sw" style="background:#524D46"></div>
    <div class="sw" style="background:#6B665E"></div>
    <div class="sw" style="background:#8C867D"></div>
    <div class="sw" style="background:#B3ADA4"></div>
    <div class="sw" style="background:#D7D2CA"></div>
    <div class="sw" style="background:#E9E5DF"></div>
    <div class="sw" style="background:#F4F1EC;border-right:1px solid var(--ink-100)"></div>
  </div>
  <div class="meta">
    <span class="t cap"><b>--ink-950</b> · core black <b>900</b> #1A1714</span>
    <span class="t cap">50 · #F4F1EC</span>
  </div>
</body></html>
