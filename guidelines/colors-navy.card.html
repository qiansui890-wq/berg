<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--cream);padding:18px 20px;font-family:var(--font-sans);}
  .row{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:74px;}
  .meta{display:flex;justify-content:space-between;margin-top:8px;padding:0 2px;}
  .t{font-size:11px;color:var(--ink-500);font-family:var(--font-mono);}
  b{color:var(--navy-800);}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#0E1622"></div>
    <div class="sw" style="background:#16202E"></div>
    <div class="sw" style="background:#1E2C3E"></div>
    <div class="sw" style="background:#283A50"></div>
    <div class="sw" style="background:#344C68"></div>
    <div class="sw" style="background:#3F5A7C"></div>
    <div class="sw" style="background:#5E7794"></div>
    <div class="sw" style="background:#8FA3BC"></div>
    <div class="sw" style="background:#BECAD9"></div>
    <div class="sw" style="background:#E0E6EE;border-right:1px solid var(--ink-100)"></div>
  </div>
  <div class="meta">
    <span class="t"><b>--navy-950</b> &nbsp; core <b>--navy-900 #16202E</b></span>
    <span class="t">100 · #E0E6EE</span>
  </div>
</body></html>
