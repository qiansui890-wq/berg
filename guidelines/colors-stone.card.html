<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--cream);padding:18px 20px;font-family:var(--font-sans);}
  .row{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:74px;}
  .meta{display:flex;justify-content:space-between;margin-top:8px;padding:0 2px;}
  .t{font-size:11px;color:var(--ink-500);font-family:var(--font-mono);}
  b{color:var(--stone-700);}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#4A4034"></div>
    <div class="sw" style="background:#5E5343"></div>
    <div class="sw" style="background:#726552"></div>
    <div class="sw" style="background:#8A7B66"></div>
    <div class="sw" style="background:#A89A85"></div>
    <div class="sw" style="background:#C5BAA9"></div>
    <div class="sw" style="background:#DED6C9"></div>
    <div class="sw" style="background:#EDE7DC"></div>
    <div class="sw" style="background:#F7F3EC;border-right:1px solid var(--ink-100)"></div>
  </div>
  <div class="meta">
    <span class="t"><b>--stone-800</b> &nbsp; core accent <b>--stone-500 #8A7B66</b></span>
    <span class="t">50 · #F7F3EC</span>
  </div>
</body></html>
