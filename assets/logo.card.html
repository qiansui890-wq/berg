<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--cream); display:flex; align-items:stretch; gap:0; }
  .cell { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:30px 20px; }
  .cell + .cell { border-left:1px solid var(--ink-100); }
  .dark { background:var(--navy-900); }
  .stone { background:var(--stone-100); }
  .label { font-family:var(--font-sans); font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-400); }
  .dark .label { color:var(--navy-200); }
  img { display:block; }
</style>
</head>
<body>
  <div class="cell">
    <img src="berg-pc-logo.png" alt="Berg PC" height="116">
    <span class="label">Primary lockup</span>
  </div>
  <div class="cell dark">
    <img src="berg-pc-logo-reverse.png" alt="Berg PC" height="116">
    <span class="label">Reverse — on navy</span>
  </div>
  <div class="cell stone">
    <img src="berg-pc-mark.png" alt="Berg PC mark" height="92">
    <span class="label">Mark only</span>
  </div>
</body>
</html>
