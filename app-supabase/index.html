<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Berg PC — Case Management Platform (Supabase)</title>
<link rel="stylesheet" href="../styles.css">
<script>
  /* Silence the harmless in-browser Babel transformer warning. */
  (function () {
    var _warn = console.warn.bind(console);
    console.warn = function () { var m = arguments[0]; if (typeof m === "string" && m.indexOf("in-browser Babel transformer") !== -1) return; return _warn.apply(null, arguments); };
  })();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<!-- Supabase SDK + project config + data layer (replaces the localStorage db.js) -->
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="../_ds_bundle.js"></script>
<script src="logos.js"></script>
<style>
  html,body{margin:0;height:100%;background:var(--bg-page-alt);}
  #root{height:100vh;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--ink-200);border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  .setup{max-width:560px;margin:0 auto;padding:64px 28px;font-family:var(--font-ui);color:var(--ink-700);}
  .setup h1{font-family:var(--font-serif);font-size:28px;color:var(--ink-900);margin:0 0 6px;}
  .setup code{font-family:var(--font-mono);font-size:13px;background:var(--ink-100);padding:2px 6px;border-radius:4px;}
  .setup ol{line-height:1.8;}
</style>
</head>
<body>
<div id="root"></div>

<!-- data layer: plain JS (no Babel) -->
<script src="db.supabase.js"></script>

<!-- UI: Babel-transpiled, same files as the demo app -->
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="trace.jsx"></script>
<script type="text/babel" src="casedetail.jsx"></script>
<script type="text/babel" src="lawyer.jsx"></script>
<script type="text/babel" src="client.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>
<script type="text/babel">
const { Shell, ToastHost, Ico, refreshIcons } = window.BergUI;
const { AuthScreen } = window.BergAuth;
const { LawyerApp } = window.BergLawyer;
const { ClientApp } = window.BergClient;
const { AdminApp } = window.BergAdmin;

const NAV = {
  admin: [
    { section: "Console" },
    { id: "overview", icon: "layout-dashboard", label: "Firm overview" },
    { id: "assign", icon: "users-round", label: "Client assignment" },
    { id: "users", icon: "user-cog", label: "User management" },
    { id: "activity", icon: "history", label: "Activity log" },
  ],
  lawyer: [
    { section: "Workspace" },
    { id: "board", icon: "layout-dashboard", label: "Daily board" },
    { id: "clients", icon: "folder-search", label: "My cases" },
  ],
  client: [
    { section: "My case" },
    { id: "home", icon: "gauge", label: "Case progress" },
    { id: "documents", icon: "files", label: "My documents" },
    { id: "messages", icon: "message-circle", label: "Secure messages" },
    { id: "profile", icon: "user", label: "My profile" },
  ],
};
const DEFAULT_VIEW = { admin: "overview", lawyer: "board", client: "home" };
const TITLES = {
  overview: "Firm overview", assign: "Client assignment", users: "User management", activity: "Activity log",
  board: "Daily board", clients: "My cases", home: "Case progress", documents: "My documents", messages: "Secure messages", profile: "My profile",
};

/* ---- global search (lawyer / admin) ---- */
function GlobalSearch({ user, onOpen }) {
  const [q, setQ] = React.useState("");
  const [focus, setFocus] = React.useState(false);
  const results = q.trim() ? window.DB.clientsFor(user).filter((c) => (c.name + " " + c.matterType + " " + c.id).toLowerCase().includes(q.toLowerCase())).slice(0, 6) : [];
  return (
    <div style={{ position: "relative", width: 240 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, border: "1px solid var(--border-default)", borderRadius: "var(--radius-sm)", padding: "7px 11px", background: "var(--white)" }}>
        <Ico n="search" s={16} c="var(--ink-400)" />
        <input value={q} onChange={(e) => setQ(e.target.value)} onFocus={() => setFocus(true)} onBlur={() => setTimeout(() => setFocus(false), 150)} placeholder="Search cases…" style={{ border: "none", outline: "none", background: "transparent", fontFamily: "var(--font-ui)", fontSize: 13.5, width: "100%", color: "var(--ink-800)" }} />
      </div>
      {focus && results.length > 0 && (
        <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, background: "var(--white)", border: "1px solid var(--border-default)", borderRadius: "var(--radius-md)", boxShadow: "var(--shadow-lg)", zIndex: 50, padding: 6 }}>
          {results.map((c) => (
            <button key={c.id} onMouseDown={() => { onOpen(c.id); setQ(""); }} style={{ display: "flex", width: "100%", alignItems: "center", gap: 9, border: "none", background: "transparent", borderRadius: "var(--radius-sm)", padding: "8px 10px", cursor: "pointer", textAlign: "left", fontFamily: "var(--font-ui)" }}
              onMouseEnter={(e) => e.currentTarget.style.background = "var(--ink-50)"} onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
              <Ico n="folder" s={15} c="var(--stone-600)" />
              <span style={{ flex: 1 }}><span style={{ fontSize: 13.5, color: "var(--ink-900)", fontWeight: 600 }}>{c.name}</span><span style={{ display: "block", fontSize: 11.5, color: "var(--ink-500)" }}>{c.matterType} · {c.status}</span></span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function Platform() {
  const [user, setUser] = React.useState(() => window.DB.currentUser());
  const [view, setView] = React.useState(() => { const u = window.DB.currentUser(); return u ? DEFAULT_VIEW[u.role] : null; });
  const [openClientId, setOpenClientId] = React.useState(null);
  const [, force] = React.useReducer((x) => x + 1, 0);
  React.useEffect(() => window.DB.subscribe(force), []);
  React.useEffect(refreshIcons);

  if (!user) return <AuthScreen onAuthed={(u) => { setUser(u); setView(DEFAULT_VIEW[u.role]); }} />;

  const logout = async () => { await window.DB.logout(); setUser(null); setView(null); };
  const nav = NAV[user.role];
  const crumb = { admin: "Administrator", lawyer: "Attorney workspace", client: "Client portal" }[user.role];
  const unread = window.DB.unreadFor(user);

  const body =
    user.role === "admin" ? <AdminApp user={user} view={view} openClientId={openClientId} /> :
    user.role === "lawyer" ? <LawyerApp user={user} initial={view} openClientId={openClientId} /> :
    <ClientApp user={user} view={view} onNav={setView} />;

  return (
    <Shell user={user} nav={nav} active={view} onNav={setView} onLogout={logout}
      title={TITLES[view] || crumb} crumb={crumb}
      actions={<>
        {(user.role === "lawyer" || user.role === "admin") && <GlobalSearch user={user} onOpen={(id) => setOpenClientId(id + ":" + Date.now())} />}
        {unread > 0 && (
          <button onClick={() => setView(user.role === "client" ? "messages" : "board")} title={unread + " unread message(s)"} style={{ position: "relative", border: "1px solid var(--border-default)", background: "var(--white)", borderRadius: "var(--radius-sm)", width: 38, height: 38, cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center", color: "var(--ink-600)" }}>
            <Ico n="bell" s={18} />
            <span style={{ position: "absolute", top: 5, right: 6, minWidth: 15, height: 15, padding: "0 3px", borderRadius: 8, background: "var(--danger-500)", color: "#fff", fontFamily: "var(--font-mono)", fontSize: 10, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 0 0 2px var(--white)" }}>{unread}</span>
          </button>
        )}
      </>}>
      {body}
    </Shell>
  );
}

function Root() {
  React.useEffect(refreshIcons);
  return <ToastHost><Platform /></ToastHost>;
}

function SetupNotice() {
  return (
    <div className="setup">
      <h1>Connect your Supabase project</h1>
      <p>This is the backend-connected build. Before it can run, point it at your project:</p>
      <ol>
        <li>Run <code>supabase/schema.sql</code> in the Supabase SQL Editor.</li>
        <li>Open <code>app-supabase/config.js</code> and paste your <b>Project URL</b> and <b>anon public key</b> (Supabase → Project Settings → API).</li>
        <li>Create an admin: sign up once, then <code>update public.profiles set role='admin' where email='you@firm.com';</code></li>
        <li>Reload this page and sign in.</li>
      </ol>
      <p style={{color:"var(--ink-500)",fontSize:13}}>Full guide: <code>supabase/README.md</code>. For a no-setup preview, open the demo build at <code>app/index.html</code>.</p>
    </div>
  );
}

const configured = window.BERG_SUPABASE_URL && window.BERG_SUPABASE_URL.indexOf("YOUR-PROJECT") === -1 && window.BERG_SUPABASE_ANON_KEY && window.BERG_SUPABASE_ANON_KEY.indexOf("YOUR-") === -1;
const rootEl = ReactDOM.createRoot(document.getElementById('root'));
if (!configured) {
  rootEl.render(<SetupNotice />);
} else {
  // Always render the app (login screen) — never fall back to the setup
  // notice just because session restore failed.
  window.DB.init().catch((e) => console.error("init", e)).finally(() => {
    rootEl.render(<Root />);
  });
}
</script>
</body>
</html>
