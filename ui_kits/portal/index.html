        <div key={t} style={{ display: "flex", gap: 14 }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
            <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 30, height: 30, borderRadius: "50%", flex: "none",
              background: st==="done" ? "var(--success-500)" : st==="active" ? "var(--navy-800)" : "var(--ink-100)",
              color: st==="todo" ? "var(--ink-400)" : "var(--cream)", border: st==="active" ? "3px solid var(--stone-300)" : "none" }}>
              {st==="done" ? <Ico n="check" s={15}/> : st==="active" ? <Ico n="loader" s={15}/> : <span style={{ fontSize: 12, fontWeight: 600 }}>{i+1}</span>}
            </span>
            {i < STEPS.length-1 && <span style={{ width: 2, flex: 1, minHeight: 26, background: st==="done" ? "var(--success-500)" : "var(--border-default)" }}></span>}
          </div>
          <div style={{ paddingBottom: 22 }}>
            <div style={{ fontFamily: "var(--font-ui)", fontSize: 15, fontWeight: st==="todo"?500:600, color: st==="todo" ? "var(--ink-400)" : "var(--ink-900)" }}>{t}</div>
            <div style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--ink-400)", marginTop: 2 }}>{d}</div>
          </div>
        </div>
      ))}
    </div>
  );
}
