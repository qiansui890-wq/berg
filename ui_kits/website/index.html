<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Berg PC — Houston Trial & Business Law Firm</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0;background:var(--cream);}
  ::-webkit-scrollbar{width:11px;height:11px;}
  ::-webkit-scrollbar-thumb{background:var(--ink-200);border-radius:6px;}
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="8" fill="#16202E"/>
    <path d="M24 20 L32 36 H16 Z" fill="#F7F4EE" transform="translate(8 4)"/>
    <rect x="22" y="42" width="20" height="2.4" rx="1.2" fill="#8A7B66"/>
    <text x="32" y="56" font-family="Georgia, serif" font-size="9" fill="#C5BAA9" text-anchor="middle" font-weight="700">BERG PC</text>
  </svg>
</template>
<div id="root"></div>
<script type="text/babel" src="parts.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
const { TopBar, Header, Hero, PressBand, Practice, Results, Footer } = window.BergWeb;
const { CryptoRecovery, Intake } = window.BergWebScreens;

function App(){
  const [route, setRoute] = React.useState("home");
  const go = (r) => { setRoute(r); window.scrollTo(0,0); };
  React.useEffect(()=>{ const t=setTimeout(()=>window.lucide&&window.lucide.createIcons(),40); return ()=>clearTimeout(t); });
  return (
    <div>
      <TopBar/>
      <Header route={route} go={go}/>
      {route==="home" && <><Hero go={go}/><PressBand/><Practice go={go}/><Results/></>}
      {route==="crypto" && <CryptoRecovery go={go}/>}
      {route==="intake" && <Intake go={go}/>}
      <Footer/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
