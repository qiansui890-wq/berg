<!-- @dsCard group="Tracing Tool" viewport="1320x820" -->
<!-- @startingPoint section="Tracing Tool" subtitle="Blockchain investigation workspace — search, flow graph, wallet inspector" viewport="1320x860" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Berg PC — Asset Trace</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0;height:100%;background:var(--bg-page-alt);}
  #root{height:100vh;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--ink-200);border-radius:6px;}
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="8" fill="#16202E"/>
    <circle cx="18" cy="32" r="5" fill="#BC3B2C"/>
    <circle cx="38" cy="20" r="5" fill="#8A7B66"/>
    <circle cx="38" cy="44" r="5" fill="#2E76A6"/>
    <circle cx="50" cy="32" r="5" fill="#2F8A57"/>
    <path d="M23 32 L33 22 M23 32 L33 42 M43 44 L47 35" stroke="#5E7794" stroke-width="1.6" fill="none"/>
  </svg>
</template>
<div id="root"></div>
<script type="text/babel" src="../dashboard/shell.jsx"></script>
<script type="text/babel" src="../dashboard/TraceGraph.jsx"></script>
<script type="text/babel">
const DSx = window.BergPCDesignSystem_eb13e3;
const { Card, CardHeader, Stat, Badge, Button, AddressChip, Input, Tag, IconButton, Alert, Tabs, Stepper, Table } = DSx;
const { Sidebar, Topbar, AIco } = window.BergApp;
const { TraceGraph, TraceLegend, ROLE_COLOR, ROLE_BADGE, NODES, TXNS } = window.BergTrace;

const NODE_BY = Object.fromEntries(NODES.map((n) => [n.id, n]));
const ALERT_TONE = { tainted: "info", hop: "neutral", mixer: "danger", exchange: "warning", frozen: "success" };
const ACTION = {
  tainted: ["git-branch", "Trace forward"], hop: ["git-branch", "Trace forward"],
  mixer: ["flag", "Flag high-risk"], exchange: ["snowflake", "Request freeze"], frozen: ["file-plus", "Add to report"],
};
const STATUS_TONE = { Confirmed: "neutral", Mixed: "accent", "Off-ramp": "info", Frozen: "success" };

function Inspector({ node }){
  const [btone, blabel] = ROLE_BADGE[node.role];
  const [aicon, alabel] = ACTION[node.role];
  return (
    <Card padding="lg" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9, minWidth: 0 }}>
          <span style={{ width: 11, height: 11, borderRadius: "50%", background: ROLE_COLOR[node.role], flex: "none" }}></span>
          <h3 style={{ fontFamily: "var(--font-serif)", fontSize: 18, margin: 0, color: "var(--ink-900)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{node.label}</h3>
        </div>
        <Badge tone={btone}>{blabel}</Badge>
      </div>
      <AddressChip address={node.addr} role={node.role} />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Stat label="Balance" value={node.balance} caption={node.usd} />
        <Stat label="Transactions" value={node.txs} caption="in/out" />
      </div>
      <div style={{ borderTop: "1px solid var(--border-subtle)", paddingTop: 14, display: "flex", flexDirection: "column", gap: 9, fontFamily: "var(--font-ui)", fontSize: 13.5 }}>
        {[["First seen", node.first],["Last activity", node.last],["Cluster", node.cluster]].map(([k,v])=>(
          <div key={k} style={{ display: "flex", justifyContent: "space-between", gap: 12 }}><span style={{ color: "var(--ink-500)", flex: "none" }}>{k}</span><span style={{ color: "var(--ink-800)", fontFamily: k==="Cluster"?"var(--font-ui)":"var(--font-mono)", fontWeight: 500, textAlign: "right" }}>{v}</span></div>
        ))}
      </div>
      <Alert tone={ALERT_TONE[node.role]} icon={<AIco n="info" s={17}/>}>{node.note}</Alert>
      <div style={{ display: "flex", gap: 10 }}>
        <Button variant="primary" fullWidth iconLeft={<AIco n={aicon} s={16}/>}>{alabel}</Button>
        <IconButton label="Add to report" variant="outline"><AIco n="file-plus" s={17}/></IconButton>
      </div>
    </Card>
  );
}

function TxnTable({ onSelect }){
  return (
    <Card padding="none">
      <Table
        rowKey="hash"
        onRowClick={(r)=>onSelect(NODE_BY[r.to])}
        columns={[
          { key:"hash", label:"Transaction", render:(v)=> <span style={{fontFamily:"var(--font-mono)",fontSize:12.5,color:"var(--ink-800)"}}>{v}</span> },
          { key:"from", label:"From", render:(v)=> NODE_BY[v].label },
          { key:"to", label:"To", render:(v)=> NODE_BY[v].label },
          { key:"amount", label:"Amount", align:"right", render:(v)=> <span style={{fontFamily:"var(--font-mono)",fontWeight:600}}>{v}</span> },
          { key:"date", label:"Date", render:(v)=> <span style={{fontFamily:"var(--font-mono)",fontSize:12.5,color:"var(--ink-600)"}}>{v}</span> },
          { key:"status", label:"Status", render:(v)=> <Badge tone={STATUS_TONE[v]}>{v}</Badge> },
        ]}
        rows={TXNS}
      />
    </Card>
  );
}

function WalletTable({ onSelect }){
  return (
    <Card padding="none">
      <Table
        rowKey="id"
        onRowClick={(r)=>onSelect(r)}
        columns={[
          { key:"label", label:"Wallet", render:(v,r)=> <span style={{display:"inline-flex",alignItems:"center",gap:8}}><span style={{width:9,height:9,borderRadius:"50%",background:ROLE_COLOR[r.role]}}></span>{v}</span> },
          { key:"addr", label:"Address", render:(v,r)=> <AddressChip address={v} role={r.role} /> },
          { key:"role", label:"Role", render:(v)=> { const [t,l]=ROLE_BADGE[v]; return <Badge tone={t}>{l}</Badge>; } },
          { key:"amt", label:"Through", align:"right", render:(v)=> <span style={{fontFamily:"var(--font-mono)",fontWeight:600}}>{v}</span> },
          { key:"last", label:"Last seen", render:(v)=> <span style={{fontFamily:"var(--font-mono)",fontSize:12.5,color:"var(--ink-600)"}}>{v}</span> },
        ]}
        rows={NODES}
      />
    </Card>
  );
}

function App(){
  const [sel, setSel] = React.useState("ex1");
  const [tab, setTab] = React.useState("graph");
  const node = NODE_BY[sel] || NODES[0];
  const select = (n) => setSel(n.id);
  React.useEffect(()=>{ const t=setTimeout(()=>window.lucide&&window.lucide.createIcons(),30); return ()=>clearTimeout(t); });
  return (
    <div style={{ display: "flex", height: "100vh", overflow: "hidden", fontFamily: "var(--font-ui)" }}>
      <Sidebar active="trace" go={()=>{}} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <Topbar title="Asset Trace" crumb="Investigation · BPC-2025-0417">
          <Button size="sm" variant="secondary" iconLeft={<AIco n="file-down" s={15}/>}>Export</Button>
        </Topbar>
        <div style={{ padding: "16px 26px", borderBottom: "1px solid var(--border-subtle)", background: "var(--white)", display: "flex", gap: 12, alignItems: "center" }}>
          <div style={{ flex: 1, maxWidth: 560 }}>
            <Input placeholder="Trace an address — bc1q… or 0x…" iconLeft={<AIco n="search" s={17}/>} defaultValue="bc1q9zk2m4f8x3v0rd7t6yqe2h5n8s4p1w0c9j6l3" />
          </div>
          <Tag iconLeft={<AIco n="layers" s={14}/>}>Depth: 7 hops</Tag>
          <Tag iconLeft={<AIco n="bitcoin" s={14}/>}>Chain: BTC</Tag>
          <div style={{ flex: 1 }}></div>
          <Button variant="primary" iconLeft={<AIco n="play" s={15}/>}>Run trace</Button>
        </div>
        <main style={{ flex: 1, overflow: "auto", padding: 26, display: "grid", gridTemplateColumns: "minmax(0,1fr) 340px", gap: 18, alignItems: "start" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14, minWidth: 0 }}>
            <Card padding="lg">
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, gap: 12, flexWrap: "wrap" }}>
                <div style={{ fontFamily: "var(--font-ui)", fontSize: 11, fontWeight: 600, letterSpacing: ".14em", textTransform: "uppercase", color: "var(--stone-600)" }}>Recovery progress</div>
                <Badge tone="warning">Freeze stage</Badge>
              </div>
              <Stepper current={2} steps={[{label:"Trace",sub:"on-chain"},{label:"Identify",sub:"attribute"},{label:"Freeze",sub:"injunction"},{label:"Recover",sub:"judgment"}]} />
            </Card>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>
              <Card padding="md"><Stat label="Traced" value="86%" caption="of 8.42 BTC" /></Card>
              <Card padding="md"><Stat label="Wallets" value={NODES.length} caption="in path" /></Card>
              <Card padding="md"><Stat label="Off-ramps" value="2" caption="exchanges" /></Card>
              <Card padding="md"><Stat label="Frozen" value="3.32 BTC" deltaTone="success" delta="confirmed" /></Card>
            </div>
            <Card padding="md">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, gap: 12, flexWrap: "wrap" }}>
                <Tabs value={tab} onChange={setTab} items={[
                  {id:"graph",label:"Flow graph",icon:<AIco n="git-branch" s={15}/>},
                  {id:"txns",label:"Transactions",icon:<AIco n="arrow-left-right" s={15}/>},
                  {id:"wallets",label:"Wallets",icon:<AIco n="wallet" s={15}/>},
                ]}/>
                {tab==="graph" && <div style={{ display: "flex", gap: 8 }}>
                  <IconButton label="Zoom out" variant="outline"><AIco n="minus" s={16}/></IconButton>
                  <IconButton label="Zoom in" variant="outline"><AIco n="plus" s={16}/></IconButton>
                  <IconButton label="Fit" variant="outline"><AIco n="maximize" s={16}/></IconButton>
                </div>}
              </div>
              {tab==="graph" && <><div style={{ marginTop: 4 }}><TraceGraph height={340} onSelect={select} selectedId={sel} /></div><TraceLegend /></>}
              {tab==="txns" && <div style={{ marginTop: 12 }}><TxnTable onSelect={select} /></div>}
              {tab==="wallets" && <div style={{ marginTop: 12 }}><WalletTable onSelect={select} /></div>}
            </Card>
          </div>
          <Inspector node={node} />
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
